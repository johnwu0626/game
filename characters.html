        const Icon = ({ name, className = '', size = 24 }) => {
            const lucideInstance = window.lucide || {};
            let iconData = lucideInstance.icons
                ? (lucideInstance.icons[name] || lucideInstance.icons[name.charAt(0).toLowerCase() + name.slice(1)])
                : null;
            if (!iconData) return <div style={{ width: size, height: size }} className={className}></div>;
            const [tag, attrs, children] = iconData;
            const safeChildren = Array.isArray(children) ? children : [];
            return React.createElement(tag, {
                ...attrs, width: size, height: size, className,
                dangerouslySetInnerHTML: {
                    __html: safeChildren.map(child => {
                        const [cTag, cAttrs] = child;
                        const attrStr = Object.entries(cAttrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${cTag} ${attrStr}></${cTag}>`;
                    }).join('')
                }
            });
        };
