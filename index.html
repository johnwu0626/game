        const Icon = ({ name, className = '', size = 24 }) => {
            const lucideInstance = window.lucide || {};
            let iconData = lucideInstance.icons
                ? (lucideInstance.icons[name] || lucideInstance.icons[name.charAt(0).toLowerCase() + name.slice(1)])
                : null;
            if (!iconData) return <div style={{ width: size, height: size }} className={className}></div>;
            const [tag, attrs, children] = iconData;
            const safeChildren = Array.isArray(children) ? children : [];
            return React.createElement(tag, {
                ...attrs, width: size, height: size, className,
                dangerouslySetInnerHTML: {
                    __html: safeChildren.map(child => {
                        const [cTag, cAttrs] = child;
                        const attrStr = Object.entries(cAttrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${cTag} ${attrStr}></${cTag}>`;
                    }).join('')
                }
            });

                                <span className="inline-block bg-purple-100 text-purple-700 text-sm font-bold px-4 py-1.5 rounded-full mb-4">🎮 玩法預覽</span>
                                <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-4">三大競賽模式</h2>
                                <p className="text-lg text-gray-500">從個人挑戰到全球對戰，找到最適合你的方式！</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                {MODES.map((m, idx) => (
                                    <div key={idx} className="card-hover bg-white rounded-3xl p-8 text-center shadow-lg shadow-gray-200/50 border border-gray-100 group">
                                        <div className={`w-20 h-20 bg-gradient-to-br ${m.color} rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl group-hover:scale-110 group-hover:rotate-3 transition-all duration-300`}>
                                            <Icon name={m.icon} size={36} className="text-white" />
                                        </div>
                                        <h3 className="text-xl font-black text-gray-900 mb-2">{m.name}</h3>
                                        <p className="text-gray-500 mb-6">{m.desc}</p>
                                        <a href="gameplay.html" className="inline-flex items-center gap-1 text-sm font-bold text-emerald-600 hover:text-emerald-700 transition-colors">
                                            了解更多 <Icon name="arrow-right" size={16} />
                                        </a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ═══ 數據統計 ═══ */}
                    <section className="py-24 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <span className="inline-block bg-amber-100 text-amber-700 text-sm font-bold px-4 py-1.5 rounded-full mb-4">📊 亮眼數據</span>
                                <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-4">用數字說話</h2>
                            </div>

                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
                                {STATS.map(s => (
                                    <div key={s.label} className="card-hover bg-white rounded-3xl p-8 text-center shadow-lg shadow-gray-100/50 border border-gray-100 group">
                                        <div className={`w-16 h-16 ${s.bg} rounded-2xl mx-auto mb-4 flex items-center justify-center group-hover:scale-110 transition-transform`}>
                                            <Icon name={s.icon} size={28} className={s.color} />
                                        </div>
                                        <div className="text-3xl md:text-4xl font-black text-gray-900 mb-1">{s.value}</div>
                                        <div className="text-sm text-gray-500 font-medium">{s.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ═══ CTA ═══ */}
                    <section className="hero-gradient py-20 px-6 text-center relative overflow-hidden">
                        <div className="absolute inset-0 overflow-hidden pointer-events-none">
                            <div className="absolute top-10 left-20 text-5xl opacity-20 float-anim">🎮</div>
                            <div className="absolute bottom-10 right-20 text-6xl opacity-15 float-anim-delay">🧠</div>
                        </div>
                        <div className="max-w-3xl mx-auto relative z-10">
                            <span className="text-6xl mb-6 inline-block wiggle">🚀</span>
                            <h2 className="text-4xl md:text-5xl font-black text-white mb-4">準備好變聰明了嗎？</h2>
                            <p className="text-xl text-white/80 mb-10">立即下載全民猜猜猜，用 5 分鐘證明你是最聰明的人！</p>
                            <div className="flex flex-col sm:flex-row justify-center gap-4">
                                <a href="download.html" className="bg-white text-emerald-600 px-10 py-4 rounded-2xl font-black text-lg shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-2">
                                    <Icon name="download" size={24} /> 免費下載
                                </a>
                                <a href="gameplay.html" className="border-2 border-white/50 text-white px-10 py-4 rounded-2xl font-bold text-lg hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                                    <Icon name="play-circle" size={24} /> 玩法介紹
                                </a>
                            </div>
                        </div>
                    </section>

                    <Footer />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
